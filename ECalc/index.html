<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>电极片活性物质计算器</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif; background:#f4f6f8; color:#1f2937; }
    .container { max-width:920px; margin:40px auto; padding:24px; }
    .card { background:#fff; border-radius:16px; padding:24px; margin-bottom:24px; box-shadow:0 10px 28px rgba(15,23,42,0.08); }
    h1 { text-align:center; margin:0 0 28px; font-size:30px; color:#111827; }
    h2 { margin:0 0 18px; font-size:22px; color:#111827; border-left:5px solid #2563eb; padding-left:10px; }
    .mode-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
    .mode-option { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px 10px; border:1px solid #d1d5db; border-radius:10px; cursor:pointer; background:#f9fafb; text-align:center; }
    .mode-option input { cursor:pointer; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
    .grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
    label { display:block; font-weight:600; margin-bottom:6px; color:#374151; }
    input, select { width:100%; padding:11px 12px; border:1px solid #cbd5e1; border-radius:10px; font-size:15px; outline:none; transition:border-color 0.2s, box-shadow 0.2s; }
    input:focus, select:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,0.12); }
    .result-box { margin-top:18px; padding:16px; border-radius:12px; background:#eff6ff; border:1px solid #bfdbfe; font-size:17px; font-weight:700; color:#1e40af; }
    .button-row { display:flex; gap:12px; flex-wrap:wrap; margin-top:18px; }
    button { border:none; border-radius:10px; padding:11px 18px; font-size:15px; font-weight:700; cursor:pointer; transition:transform 0.1s,opacity 0.2s; }
    button:active { transform:translateY(1px); }
    .primary-btn { background:#2563eb; color:white; }
    .secondary-btn { background:#e5e7eb; color:#111827; }
    .danger-btn { background:#ef4444; color:white; }
    .small-note { margin-top:8px; font-size:13px; color:#6b7280; line-height:1.5; }
    table { width:100%; border-collapse:collapse; margin-top:16px; overflow:hidden; border-radius:12px; }
    th, td { padding:12px; border-bottom:1px solid #e5e7eb; text-align:center; font-size:14px; }
    th { background:#f3f4f6; color:#374151; font-weight:700; }
    tr:last-child td { border-bottom:none; }
    .empty { color:#6b7280; text-align:center; padding:20px; background:#f9fafb; border-radius:12px; margin-top:16px; }
    .highlight { font-weight:900; color:#1e40af; }
    @media (max-width:760px) { .container { margin:20px auto; padding:14px; } .grid, .grid-2 { grid-template-columns:1fr; } h1 { font-size:24px; } }
  </style>
</head>
<body>
<main class="container">
<h1>电极片活性物质计算器</h1>
<section class="card">
<h2>功能一：计算活性物质百分比</h2>
<div class="mode-row">
<label class="mode-option"><input type="radio" name="mode" value="normal" checked />选项一：常规（PVDF）</label>
<label class="mode-option"><input type="radio" name="mode" value="rolling" />选项二：辊压（PTFE × 0.6）</label>
<label class="mode-option"><input type="radio" name="mode" value="manual" />选项三：手动输入</label>
</div>
<div class="grid" id="formulaInputGrid">
<div><label for="activeMass">活性物质量 / mg</label><input id="activeMass" type="number" step="0.0001" min="0" placeholder="例如：80" /></div>
<div><label for="conductiveMass">导电剂质量 / mg</label><input id="conductiveMass" type="number" step="0.0001" min="0" placeholder="SP、KB 等" /></div>
<div><label id="binderLabel" for="binderMass">PVDF 粘结剂质量 / mg</label><input id="binderMass" type="number" step="0.0001" min="0" placeholder="例如：10" /></div>
</div>
<div id="manualPercentBox" style="display:none; margin-top:16px;"><label for="manualPercent">活性物质百分比 / %</label><input id="manualPercent" type="number" step="0.01" min="0" max="100" placeholder="例如：70.00" /></div>
<div class="result-box">活性物质百分比：<span id="activePercent">--</span></div>
<div class="small-note" id="formulaNote">常规公式：活性物质百分比 = 活性物质量 ÷（活性物质量 + 导电剂质量 + PVDF质量）× 100%</div>
</section>
<section class="card">
<h2>功能二：计算电极片中的活性物质量</h2>
<div class="grid-2">
<div><label for="dryElectrodeMass">电极片烘干后质量 m1 / mg</label><input id="dryElectrodeMass" type="number" step="0.0001" min="0" placeholder="例如：25.6" /></div>
<div><label for="collectorMass">集流体质量 m2 / mg</label><input id="collectorMass" type="number" step="0.0001" min="0" placeholder="例如：10.2" /></div>
</div>
<div style="margin-top:12px;"><label for="decimalSelect">活性物质量小数位数</label><select id="decimalSelect"><option value="2">保留2位小数</option><option value="3" selected>保留3位小数</option></select></div>
<div class="result-box">当前活性物质量：<span id="finalActiveMass">--</span></div>
<div class="small-note">公式：活性物质量 =（m1 - m2）× 活性物质百分比</div>
<div class="button-row">
<button class="primary-btn" onclick="saveResult()">保存当前结果</button>
<button class="secondary-btn" onclick="clearInputs()">清空输入</button>
<button class="danger-btn" id="clearResultsBtn">清空保存结果</button>
</div>
</section>
<section class="card">
<h2>输出栏：保存结果</h2>
<div id="savedResults"></div>
</section>
</main>
<script>
const modeInputs=document.querySelectorAll('input[name="mode"]');
const activeMassInput=document.getElementById('activeMass');
const conductiveMassInput=document.getElementById('conductiveMass');
const binderMassInput=document.getElementById('binderMass');
const binderLabel=document.getElementById('binderLabel');
const formulaInputGrid=document.getElementById('formulaInputGrid');
const manualPercentBox=document.getElementById('manualPercentBox');
const manualPercentInput=document.getElementById('manualPercent');
const activePercentSpan=document.getElementById('activePercent');
const formulaNote=document.getElementById('formulaNote');
const dryElectrodeMassInput=document.getElementById('dryElectrodeMass');
const collectorMassInput=document.getElementById('collectorMass');
const decimalSelect=document.getElementById('decimalSelect');
const finalActiveMassSpan=document.getElementById('finalActiveMass');
const savedResultsDiv=document.getElementById('savedResults');
const clearResultsBtn=document.getElementById('clearResultsBtn');
let savedResults=[];
function getMode(){return document.querySelector('input[name="mode"]:checked').value;}
function getNumber(input){const value=parseFloat(input.value);return Number.isFinite(value)?value:null;}
function calculateActivePercentValue(){const mode=getMode();if(mode==='manual'){const manualPercent=getNumber(manualPercentInput);if(manualPercent===null||manualPercent<0||manualPercent>100){return null;}return manualPercent/100;}const activeMass=getNumber(activeMassInput);const conductiveMass=getNumber(conductiveMassInput);const binderMass=getNumber(binderMassInput);if(activeMass===null||conductiveMass===null||binderMass===null){return null;}if(activeMass<0||conductiveMass<0||binderMass<0){return null;}let totalMass;if(mode==='normal'){totalMass=activeMass+conductiveMass+binderMass;}else{totalMass=activeMass+conductiveMass+binderMass*0.6;}if(totalMass<=0){return null;}return activeMass/totalMass;}
function updateModeText(){const mode=getMode();if(mode==='normal'){formulaInputGrid.style.display='grid';manualPercentBox.style.display='none';binderLabel.textContent='PVDF 粘结剂质量 / mg';binderMassInput.placeholder='例如：10';formulaNote.textContent='常规公式：活性物质百分比 = 活性物质量 ÷（活性物质量 + 导电剂质量 + PVDF质量）× 100%';}else if(mode==='rolling'){formulaInputGrid.style.display='grid';manualPercentBox.style.display='none';binderLabel.textContent='PTFE 粘结剂质量 / mg';binderMassInput.placeholder='输入 PTFE 原始质量';formulaNote.textContent='辊压公式：活性物质百分比 = 活性物质量 ÷（活性物质量 + 导电剂质量 + PTFE质量 × 0.6）× 100%';}else{formulaInputGrid.style.display='none';manualPercentBox.style.display='block';formulaNote.textContent='手动模式：直接输入活性物质百分比，用于后续（m1 - m2）× 活性物质百分比计算。';}}
function updateCalculations(){updateModeText();const activePercentDecimal=calculateActivePercentValue();if(activePercentDecimal===null){activePercentSpan.textContent='--';finalActiveMassSpan.textContent='--';return;}activePercentSpan.textContent=(activePercentDecimal*100).toFixed(2)+'%';const dryElectrodeMass=getNumber(dryElectrodeMassInput);const collectorMass=getNumber(collectorMassInput);if(dryElectrodeMass===null||collectorMass===null||dryElectrodeMass<0||collectorMass<0){finalActiveMassSpan.textContent='--';return;}const coatingMass=dryElectrodeMass-collectorMass;if(coatingMass<0){finalActiveMassSpan.textContent='错误：m1 不能小于 m2';return;}const decimals=parseInt(decimalSelect.value,10);const finalActiveMass=(coatingMass*activePercentDecimal).toFixed(decimals);finalActiveMassSpan.textContent=finalActiveMass+' mg';}
function saveResult(){const activePercentDecimal=calculateActivePercentValue();const dryElectrodeMass=getNumber(dryElectrodeMassInput);const collectorMass=getNumber(collectorMassInput);if(activePercentDecimal===null||dryElectrodeMass===null||collectorMass===null){alert('请先完整输入活性物质百分比、m1 和 m2。常规/辊压模式需填写活性物质量、导电剂质量和粘结剂质量；手动模式需填写百分比。');return;}if(dryElectrodeMass<collectorMass){alert('电极片烘干后质量 m1 不能小于集流体质量 m2。');return;}const mode=getMode();const coatingMass=dryElectrodeMass-collectorMass;const decimals=parseInt(decimalSelect.value,10);const finalActiveMass=(coatingMass*activePercentDecimal).toFixed(decimals);savedResults.push({id:savedResults.length+1,mode:mode==='normal'?'常规（PVDF）':mode==='rolling'?'辊压（PTFE × 0.6）':'手动输入',percent:(activePercentDecimal*100).toFixed(2)+'%',m1:dryElectrodeMass.toFixed(4),m2:collectorMass.toFixed(4),coatingMass:coatingMass.toFixed(4),activeMass:finalActiveMass});renderSavedResults();}
function renderSavedResults(){if(savedResults.length===0){savedResultsDiv.innerHTML='<div class="empty">暂无保存结果</div>';return;}const rows=savedResults.map(item=>`<tr><td class="highlight">${item.id}</td><td>${item.mode}</td><td>${item.percent}</td><td>${item.m1}</td><td>${item.m2}</td><td>${item.coatingMass}</td><td class="highlight">${item.activeMass} mg</td></tr>`).join('');savedResultsDiv.innerHTML=`<table><thead><tr><th>序号</th><th>计算方式</th><th>活性物质百分比</th><th>m1 / mg</th><th>m2 / mg</th><th>涂层质量 / mg</th><th>活性物质量</th></tr></thead><tbody>${rows}</tbody></table>`;}
function clearInputs(){activeMassInput.value='';conductiveMassInput.value='';binderMassInput.value='';manualPercentInput.value='';dryElectrodeMassInput.value='';collectorMassInput.value='';updateCalculations();}
function clearResults(){if(!confirm('确定要清空所有保存结果吗？')) return;savedResults.length=0;renderSavedResults();}
[...modeInputs,activeMassInput,conductiveMassInput,binderMassInput,manualPercentInput,dryElectrodeMassInput,collectorMassInput,decimalSelect].forEach(el=>{el.addEventListener('input',updateCalculations); el.addEventListener('change',updateCalculations);});
updateCalculations();renderSavedResults();
clearResultsBtn.addEventListener('click',clearResults);
</script>
</body>
</html>
